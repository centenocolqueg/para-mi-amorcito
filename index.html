<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CENTENO FIGHT | CEO MODE</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="game-wrapper">
    <div class="top-panel">
      <div>
        <p class="mini">CENTENO AI GAME</p>
        <h1>CENTENO FIGHT</h1>
      </div>

      <div class="stats">
        <div>CEO Vida: <span id="ceoHp">100</span></div>
        <div>Enemigo 1: <span id="enemy1Hp">100</span></div>
        <div>Enemigo 2: <span id="enemy2Hp">100</span></div>
      </div>
    </div>

    <div class="arena">
      <div class="stars"></div>
      <div class="grid"></div>
      <div class="planet"></div>

      <div class="fighter enemy enemy1" id="enemy1">
        <div class="head"></div>
        <div class="body"></div>
        <div class="arm arm-left"></div>
        <div class="arm arm-right"></div>
        <div class="leg leg-left"></div>
        <div class="leg leg-right"></div>
        <div class="name">VIRUS</div>
      </div>

      <div class="fighter ceo" id="ceo">
        <div class="aura"></div>
        <div class="head"></div>
        <div class="body"></div>
        <div class="core"></div>
        <div class="arm arm-left"></div>
        <div class="arm arm-right"></div>
        <div class="leg leg-left"></div>
        <div class="leg leg-right"></div>
        <div class="name">CEO</div>
      </div>

      <div class="fighter enemy enemy2" id="enemy2">
        <div class="head"></div>
        <div class="body"></div>
        <div class="arm arm-left"></div>
        <div class="arm arm-right"></div>
        <div class="leg leg-left"></div>
        <div class="leg leg-right"></div>
        <div class="name">DARK AI</div>
      </div>

      <div class="effect" id="effect"></div>

      <div class="message" id="message">
        CEO MODE ACTIVADO
      </div>

      <div class="game-over" id="gameOver">
        <h2 id="resultTitle">VICTORIA</h2>
        <p id="resultText">Ganaste la pelea.</p>
        <button onclick="restartGame()">REINICIAR 🔁</button>
      </div>
    </div>

    <div class="controls">
      <button onclick="attack()">👊 Golpe</button>
      <button onclick="block()">🛡️ Defensa</button>
      <button onclick="power()">⚡ Poder IA</button>
      <button onclick="restartGame()">🔁 Reiniciar</button>
    </div>

    <p class="tip">
      Teclas: <b>A</b> golpe, <b>S</b> defensa, <b>D</b> poder IA.
    </p>
  </div>

  <script src="script.js"></script>
</body>
</html>
