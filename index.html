<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para mi amorcito ❤️</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="corazones"></div>

  <main class="card">
    <p class="mini">Un detallito para ti</p>

    <h1>Para mi amorcito ❤️</h1>

    <p class="mensaje">
      Hice esto solo para sacarte una sonrisita.
    </p>

    <p class="mensaje">
      Me gusta cuando estamos bien, cuando hablamos bonito
      y cuando nos cuidamos con cariño.
    </p>

    <p class="mensaje">
      Gracias por estar en mi vida, mi amor. Me gusta saber de ti
      y sentir que estamos tranquilos.
    </p>

    <button onclick="mostrarSorpresa()">Toca aquí, mi amor 🥺❤️</button>

    <div id="sorpresa" class="sorpresa"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
